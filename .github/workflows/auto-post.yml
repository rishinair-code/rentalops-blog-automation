name: Auto Post Blog
on:
  schedule:
    - cron: '0 9 * * 1,3,5'
  workflow_dispatch:

jobs:
  post-blog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run blog poster
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_ORGANIZATION_ID: ${{ secrets.LINKEDIN_ORGANIZATION_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python blog_poster.py

      - name: Commit posts and topics log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add used_topics.json posts/
          git add published_pillars.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Add new blog post and update topics log"
          git push
          
      - name: Push JSON to Main Website
              run: |
                git config --global user.name "GitHub Action"
                git config --global user.email "action@github.com"
                git clone https://x-access-token:${{ secrets.SYNC_TOKEN }}@github.com/rishinair-code/rental-management-app sync_repo
                cp posts/*.json sync_repo/posts/
                cd sync_repo
                git add .
                git commit -m "Add new blog post from automation"
                git push
