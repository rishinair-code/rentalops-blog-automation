name: Auto Post Blog
on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  post-blog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run blog poster
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          HASHNODE_API_KEY: ${{ secrets.HASHNODE_API_KEY }}
          HASHNODE_PUBLICATION_ID: ${{ secrets.HASHNODE_PUBLICATION_ID }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          HASHNODE_BLOG_HOST: ${{ secrets.HASHNODE_BLOG_HOST }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_ORGANIZATION_ID: ${{ secrets.LINKEDIN_ORGANIZATION_ID }}
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
        run: python blog_poster.py

      - name: Commit used topics log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add used_topics.json
          git diff --staged --quiet || git commit -m "Update used topics log"
          git push
