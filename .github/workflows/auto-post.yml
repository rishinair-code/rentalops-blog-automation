name: Auto Post Blog
on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  post-blog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run blog poster
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_ORGANIZATION_ID: ${{ secrets.LINKEDIN_ORGANIZATION_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: python blog_poster.py

      - name: Commit posts and topics log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add used_topics.json posts/ published_pillars.json
          git diff --staged --quiet || git commit -m "Add new blog post and update topics log"
          git push

      - name: Wait for GitHub to register the commit
        run: |
          echo "⏳ Waiting 20 seconds for GitHub API to reflect new commit..."
          sleep 20

      - name: Trigger Vercel redeploy
        run: |
          echo "🚀 Triggering Vercel redeploy..."
          RESPONSE=$(curl -s -o /tmp/vercel_response.json -w "%{http_code}" \
            -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}")
          echo "HTTP Status: $RESPONSE"
          cat /tmp/vercel_response.json
          if [ "$RESPONSE" = "200" ] || [ "$RESPONSE" = "201" ]; then
            echo "✅ Vercel redeploy triggered successfully"
            echo "🗺️  Sitemap will update in ~3 minutes"
          else
            echo "❌ Vercel deploy hook failed with status $RESPONSE"
            exit 1
          fi
